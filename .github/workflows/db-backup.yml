name: Monthly DB Backup

on:
  schedule:
    # Run on the 1st of every month at 2:00 AM UTC
    - cron: "0 2 1 * *"
  workflow_dispatch:

jobs:
  backup:
    name: PostgreSQL Backup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          TIMESTAMP=$(date +%Y-%m-%d_%H%M%S)
          FILENAME="ccb_backup_${TIMESTAMP}.sql.gz"
          docker run --rm \
            -v "${{ github.workspace }}:/backup" \
            -e PGPASSWORD="$(echo $DATABASE_URL | sed -n 's/.*:\/\/[^:]*:\([^@]*\)@.*/\1/p')" \
            postgres:18 \
            sh -c "pg_dump '$DATABASE_URL' --format=plain --no-owner --no-privileges | gzip > /backup/$FILENAME"
          echo "FILENAME=${FILENAME}" >> "$GITHUB_ENV"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: ${{ env.FILENAME }}
          retention-days: 90
          if-no-files-found: error

      - name: Summary
        run: |
          echo "## Database Backup Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **File:** \`${{ env.FILENAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Retention:** 90 days" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download from: Actions > This workflow run > Artifacts" >> "$GITHUB_STEP_SUMMARY"
