services:
  - type: web
    name: ccbwebsite
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn ccbwebsite.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,ccbwebremaster-v2.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,https://ccbwebremaster-v2.vercel.app"
      - key: ADMIN_URL
        sync: false
      - key: CONTACT_INQUIRY_RECIPIENT
        value: "citycollegeofbayawan@gmail.com"
      - key: EMAIL_HOST
        value: "smtp-relay.brevo.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: DATABASE_URL
        sync: false
