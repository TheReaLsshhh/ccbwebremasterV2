services:
  - type: web
    name: ccbwebsite
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --run-syncdb && gunicorn ccbwebsite.wsgi:application --workers 2 --threads 4 --timeout 60 --log-file -
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "ccbacad.dpdns.org,ccbwebremasterv2.onrender.com,.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://ccbacad.dpdns.org,https://ccbwebremasterv2.onrender.com,https://*.onrender.com"
      - key: PUBLIC_SITE_URL
        value: "https://ccbacad.dpdns.org"
      - key: OLD_PUBLIC_HOSTS
        value: ""
      - key: ADMIN_URL
        value: "ccb-office"
      - key: ADMIN_LOGIN_RATE_LIMIT_ATTEMPTS
        value: "2"
      - key: ADMIN_PIN_RATE_LIMIT_ATTEMPTS
        value: "2"
      - key: CONTACT_INQUIRY_RECIPIENT
        value: "citycollegeofbayawan@gmail.com"
      - key: EMAIL_HOST
        value: "smtp-relay.brevo.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: RECAPTCHA_PUBLIC_KEY
        value: "6LcAXhUtAAAAAHEfverzI1IQPzo8gwzHUP8m8WNt"
      - key: RECAPTCHA_PRIVATE_KEY
        sync: false
