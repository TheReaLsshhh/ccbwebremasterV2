{% load news_extras %}

{% for requirement in requirements %}
    <div class="col-lg-6">
        <div class="content-card">
            <span class="signal-badge signal-badge-requirement">Requirement</span>
            <h3 class="mt-3">{{ requirement.title }}</h3>
            <p class="muted-copy">{{ requirement.description }}</p>
            {% if requirement.document_file %}
                <a class="btn btn-soft btn-sm mt-3 btn-download" href="{{ requirement.document_file|file_download_url }}">Download Document</a>
            {% endif %}
        </div>
    </div>
{% empty %}
    <div class="col-12">
        <div class="notice-band">Add admission requirements and supporting files through the admin dashboard.</div>
    </div>
{% endfor %}
