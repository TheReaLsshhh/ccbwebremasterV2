{% load news_extras %}
<article class="coverflow-card" data-index="{{ index }}" tabindex="-1">
    <a
        class="coverflow-card-link"
        href="{% url 'website:news' %}?open={{ item.pk }}{% if item.news_page > 1 %}&amp;page={{ item.news_page }}{% endif %}#news-{{ item.pk }}"
        aria-label="Read more: {{ item.title }}"
    >
        <div class="coverflow-card-image-wrap">
            {% if item.cover_image %}
                <img
                    src="{{ item.cover_image.url }}"
                    alt=""
                    class="coverflow-card-image"
                    width="640"
                    height="480"
                    decoding="async"
                    {% if priority_image %}fetchpriority="high"{% else %}loading="lazy" fetchpriority="low"{% endif %}
                >
            {% else %}
                <div class="coverflow-card-placeholder" aria-hidden="true">
                    <i class="fa-solid fa-newspaper" aria-hidden="true"></i>
                </div>
            {% endif %}
            {% if item.event_date %}
                <span class="coverflow-card-date">{{ item.event_date }}</span>
            {% endif %}
        </div>

        <div class="coverflow-card-body">
            <h3 class="coverflow-card-title">{{ item.title }}</h3>
            {% if item.summary %}
                <p class="coverflow-card-excerpt">{{ item.summary }}</p>
            {% elif item.content %}
                <p class="coverflow-card-excerpt">{{ item.content|truncatewords:18 }}</p>
            {% endif %}
            <span class="coverflow-card-cta" aria-hidden="true">
                Read more <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
            </span>
        </div>
    </a>
</article>
